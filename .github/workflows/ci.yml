name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-check:
    name: Server - TypeScript & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: timetask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/timetask_test
      JWT_SECRET: test-jwt-secret-ci
      REFRESH_TOKEN_SECRET: test-refresh-secret-ci
      NODE_ENV: test
      BCRYPT_ROUNDS: 4

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: server
        run: npx prisma generate

      - name: TypeScript type check
        working-directory: server
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: server
        run: npm test -- --passWithNoTests

  client-build:
    name: Client - Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        env:
          VITE_API_BASE_URL: http://localhost:3000/api
          VITE_SOCKET_URL: http://localhost:3000
        run: npm run build
