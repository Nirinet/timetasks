services:
  postgres:
    image: postgres:15-alpine
    container_name: timetask-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-timetask}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-timetask}
    volumes:
      - timetask_postgres_data:/var/lib/postgresql/data
    networks:
      - timetask-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-timetask}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: timetask-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - timetask_redis_data:/data
    networks:
      - timetask-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: timetask-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-timetask}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-timetask}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required}
      PORT: 3000
      CORS_ORIGIN: https://timetask.sitechs.co.il
      SERVE_CLIENT: "true"
      RUN_MIGRATIONS: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./server/.env:/app/server/.env:ro
    networks:
      - timetask-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: timetask-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    depends_on:
      - app
    networks:
      - timetask-network

networks:
  timetask-network:
    driver: bridge

volumes:
  timetask_postgres_data:
    driver: local
  timetask_redis_data:
    driver: local
