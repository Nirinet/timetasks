version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-timetask}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-timetask_password}
      POSTGRES_DB: ${DB_NAME:-timetask}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_simple:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-timetask}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: production
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${DB_USER:-timetask}:${DB_PASSWORD:-timetask_password}@postgres:5432/${DB_NAME:-timetask}?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-super-secret}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev-super-refresh}
      SERVE_CLIENT: ${SERVE_CLIENT:-true}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data_simple:
    driver: local
